{% extends "administracion/home.html" %}

{% block content %}
    <div class="col-sm-9 col-md-9">
    <h1 class="title-project">Administración de Idiomas</h1>

    {% if idioma_list %}
        <div class="table-responsive">
        <table class="table table-striped table-border">
            <thead class="table-head">
            <tr>
                <th scope="col">Alias</th>
                <th scope="col">Nombre</th>
                <th scope="col">Editar</th>
                <th scope="col">Borrar</th>
            </tr>
          </thead>
          <tbody>
          {% for idioma in idioma_list %}
            <tr>
                <td><a href="{{ idioma.get_absolute_url }}">{{ idioma.alias}}</a></td>
                <td>{{ idioma.nombre }}</td>
                <td>
                    <p>
                        <a href="{% url 'idioma_update' idioma.id %}">
                        <button class="btn btn-primary btn-xs">
                            <span class="glyphicon glyphicon-pencil">
                            </span>
                        </button>
                        </a>
                    </p>
                </td>

                <td>
                    <p>
                        <a href="{% url 'idioma_delete' idioma.id %}">
                        <button class="btn btn-danger btn-xs">
                            <span class="glyphicon glyphicon-trash">
                            </span>
                        </button>
                        </a>
                    </p>
                </td>
            </tr>
            {% endfor %}
        </table>
        </div>

    {% else %}
        <div class="alert alert-warning" role="alert">
            No hay niveles creados
        </div>
    {% endif %}
        <button type="button" class="btn btn-info pull-right" onclick="location.href='{% url 'idioma_create' %}'">
             <span class="glyphicon glyphicon-plus-sign"></span> Nuevo idioma</button>
    </div>
{% endblock %}
