{% extends "administracion/home.html" %}

{% block content %}
    <div class="col-sm-9 col-md-9">
    <h1 class="title-project">Url: {{ url.nombre }}</h1>

    <div class="row">
        <div class="col-md-9">
        <ul class="list-group">
            <li class="list-group-item">Nombre: {{ url.nombre }}</li>
            <li class="list-group-item">PATH: {{ url.url_path }}</li>
        </ul>
        <h2 class="title-project">Eventos Asociados</h2>
            <div class="table-responsive">
                <table class="table table-striped table-border" style="table-layout: fixed;">
                    <thead class="table-head">
                    <tr>
                        <th scope="col" width="25%">Evento</th>
                    </tr>
                  </thead>
                  <tbody>
                  {% for evento in url.eventos.all %}
                    <tr>
                        <td width="25%">{{ evento.nombre }}</td>
                    </tr>
                    {% endfor %}
                </table>
            </div>
        </div>

        <div class="col-md-3">
            <div class="well">
                <h3>Acciones</h3>
                <a href="{% url 'url_update' url.id %}" class="btn btn-default">Editar</a>
                <a href="{% url 'url_delete' url.id %}" class="btn btn-default">Borrar</a>
            </div>
        </div>
    </div>
    </div>



{% endblock %}
