{% extends "administracion/home.html" %}

{% block content %}
    <div class="col-sm-9 col-md-9">
    <h1 class="title-project">Tipo de beca: {{ tipobeca.nombre }}</h1>

    <div class="row">
        <div class="col-md-9">
        <ul class="list-group">
            <li class="list-group-item">Nombre: {{ tipobeca.nombre }}</li>
            <li class="list-group-item">Porcentaje: {{ tipobeca.porcentaje }}%</li>
        </ul>
        </div>

        <div class="col-md-3">
            <div class="well">
                <h3>Acciones</h3>
                <a href="{% url 'tipo-beca-update' tipobeca.id %}" class="btn btn-default">Editar</a>
            </div>
        </div>
    </div>
    </div>



{% endblock %}
