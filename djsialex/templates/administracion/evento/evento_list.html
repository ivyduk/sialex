{% extends 'administracion/home.html' %}

{% block content %}
    <div class="col-sm-9 col-md-9">

    <h1 class="title-project">Administración Eventos Global</h1>

    {%  if evento_list %}
     <div class="table-responsive">
        <table class="table table-striped table-border">
            <thead class="table-head">
            <tr>
                <th scope="col">Nombre</th>
                <th scope="col">Editar</th>
                <th scope="col">Borrar</th>
            </tr>
          </thead>
          <tbody>
          {% for evento in evento_list %}
            <tr>
                <td><a href="{{ evento.get_absolute_url }}">{{ evento.nombre}}</a></td>
                <td>
                    <p>
                        <a href="{% url 'evento_update' evento.id %}">
                        <button class="btn btn-primary btn-xs">
                            <span class="glyphicon glyphicon-pencil">
                            </span>
                        </button>
                        </a>
                    </p>
                </td>

                <td>
                    <p>
                        <a href="{% url 'evento_delete' evento.id %}">
                        <button class="btn btn-danger btn-xs">
                            <span class="glyphicon glyphicon-trash">
                            </span>
                        </button>
                        </a>
                    </p>
                </td>
            </tr>
            {% endfor %}
        </table>
        </div>

    {% else %}
        <div class="alert alert-warning" role="alert">
            No hay eventos creadas
        </div>

    {% endif %}

        <button type="button" class="btn btn-info pull-right" onclick="location.href='{% url 'evento_create' %}'">
            <span class="glyphicon glyphicon-plus-sign"></span> Nuevo Evento</button>
    </div>
{% endblock %}
