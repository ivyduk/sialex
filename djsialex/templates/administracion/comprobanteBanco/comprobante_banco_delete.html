{% extends "administracion/home.html" %}

{% block content %}

<h1>Borrar Comprobante de pago</h1>

<form method="post" action="">
    {% csrf_token %}

  <div class="modal-header">
    <h3 class="modal-title">Confirmación borrado de Comprobante</h3>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>

  <div class="modal-body">
    <p>¿Está usted seguro de querer borrar este comprobante? <strong>{{ grupoacademico.nombre }}</strong>?</p>
  </div>

  <div class="modal-footer">
    <button type="submit" class="btn btn-danger">Borrar Comprobante</button>
  </div>

</form>
{% endblock %}
