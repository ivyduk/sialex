{% extends "administracion/home.html" %}
{% block quitarBreadcrumb %}
    true
{% endblock quitarBreadcrumb %}
{% block content %}
<div class="wrap-login col-md-9">
    <span class="login100-form-title p-b-49">
        Seleccionar periodo
    </span>
    <br />
    <form action="/administracion/contextualizar_periodo/" method="POST">
    {% csrf_token %}
        <select name="periodo" id="periodo" class="form-control">
            {% for periodo in periodos %}
                <option value="{{ periodo.id }}">{{ periodo.nombre }}</option>
            {% endfor %}
        </select>
        <br />
        <br />
        <div class="text-center">
            <input type="submit" value="Cambiar periodo, por el periodo seleccionado" class="btn btn-info">
        </div>
    </form>
</div>
{% endblock %}
